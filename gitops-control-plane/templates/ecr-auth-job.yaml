## Architecture
# This file circumvents the 12-hour expiration limit of AWS ECR authentication tokens.
# Instead of storing static IAM keys, a CronJob assumes an OIDC-backed IAM role (IRSA),
# requests a temporary token, and pushes it directly into the Argo CD namespace.
apiVersion: v1
kind: Secret
metadata:
  name: ecr-registry-secret
  namespace: argocd
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "e30=" # base64 encoded "{}"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecr-helm-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  name: aws-ecr-helm
  url: {{ .Values.registry.ecrBaseUrl }}
  type: helm
  enableOCI: "true"
  username: AWS
  password: "" # The CronJob will inject the token here
---
## Security
# This Role strictly limits the CronJob's K8s API access to modifying ONLY the ECR secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-updater
  namespace: argocd
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["ecr-registry-secret", "ecr-helm-repo-secret"]
  verbs: ["patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-updater-binding
  namespace: argocd
subjects:
- kind: ServiceAccount
  # Using the controller SA created by v1.2.2 install
  name: argocd-image-updater-controller
  namespace: argocd
roleRef:
  kind: Role
  name: ecr-secret-updater
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: argocd
spec:
  ## Reliability
  # The schedule is set to 8 hours to safely beat the 12-hour ECR token expiration window.
  schedule: "0 */8 * * *" # AWS ECR tokens expire after 12 hours
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          # Match the SA from above
          serviceAccountName: argocd-image-updater-controller
          restartPolicy: OnFailure
          containers:
          - name: aws-cli
            image: amazon/aws-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "Fetching ECR token via IAM Role..."
              TOKEN=$(aws ecr get-login-password --region us-east-1)
              
              # 1. Update the Docker config for Kubernetes Image Pulls
              AUTH=$(echo -n "AWS:$TOKEN" | base64 | tr -d '\n')
              DOCKER_CONFIG="{\"auths\":{\"{{ .Values.registry.ecrBaseUrl }}\":{\"username\":\"AWS\",\"password\":\"$TOKEN\",\"email\":\"none\",\"auth\":\"$AUTH\"}}}"
              DOCKER_CONFIG_B64=$(echo -n "$DOCKER_CONFIG" | base64 | tr -d '\n')
              
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              
              echo "Patching Kubernetes Docker Secret..."
              curl -s --cacert $CACERT -H "Authorization: Bearer $SA_TOKEN" \
                -H "Content-Type: application/strategic-merge-patch+json" \
                -X PATCH \
                -d "{\"data\": {\".dockerconfigjson\": \"$DOCKER_CONFIG_B64\"}}" \
                https://kubernetes.default.svc/api/v1/namespaces/argocd/secrets/ecr-registry-secret
              
              # 2. Update the Argo CD Repository Secret for OCI Helm Charts
              TOKEN_B64=$(echo -n "$TOKEN" | base64 | tr -d '\n')
              echo "Patching Argo CD OCI Helm Secret..."
              curl -s --cacert $CACERT -H "Authorization: Bearer $SA_TOKEN" \
                -H "Content-Type: application/strategic-merge-patch+json" \
                -X PATCH \
                -d "{\"data\": {\"password\": \"$TOKEN_B64\"}}" \
                https://kubernetes.default.svc/api/v1/namespaces/argocd/secrets/ecr-helm-repo-secret

              echo "ECR tokens successfully updated for both Docker and Helm!"
