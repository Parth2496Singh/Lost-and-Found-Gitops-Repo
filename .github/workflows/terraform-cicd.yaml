name: 'Terraform Infrastructure CI/CD'

# =========================================================================================
# ⚠️ BOILERPLATE INSTRUCTION:
# The push and pull_request triggers have been commented out to prevent GitHub Actions
# from automatically executing when you first fork/clone this template.
# Once you have updated your variables and bootstrapped the repo, UNCOMMENT the lines below.
# =========================================================================================
on:
  workflow_dispatch: # Allows manual triggering for now. REMOVE THIS LINE ONCE YOU HAVE UPDATED YOUR VARIABLES AND BOOTSTRAPPED THE REPO
#   push:
#     branches: [ "main" ]
#     paths: 
#       - "terraform-eks/**"
#       - "terraform-ec2/**"
#   pull_request:
#     branches: [ "main" ]
#     paths: 
#       - "terraform-eks/**"
#       - "terraform-ec2/**"

# Required permissions for AWS OIDC authentication (No hardcoded AWS Keys!)
permissions:
  id-token: write 
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform (${{ matrix.workdir }})'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Let both EKS and EC2 pipelines run even if one fails
      matrix:
        workdir: [terraform-eks, terraform-ec2]
    
    # Tells GitHub Actions to run these commands inside the specific matrix folder
    defaults:
      run:
        working-directory: ./${{ matrix.workdir }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Authenticate to AWS using OIDC (Dynamically pulls from GitHub Secrets/Vars)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init

    # Formatting check to ensure clean code
    - name: Terraform Format
      run: terraform fmt -check

    # Runs a plan on Pull Requests so you can review changes safely
    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color
      continue-on-error: true

    # Posts the Terraform Plan output as a comment on the GitHub PR
    - name: Update PR with Plan
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        script: |
          const output = `#### Terraform Plan (${{ matrix.workdir }}) 📖\`${{ steps.plan.outcome }}\`
          
          <details><summary>Show Plan</summary>
          
          \`\`\`\n
          ${process.env.PLAN}
          \`\`\`
          
          </details>`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    # Fails the workflow if the plan failed
    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    # Automatically applies changes ONLY when code is merged into the main branch
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve